name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r26c
          cmdline-tools-version: latest
          build-tools-version: 34.0.0

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clear ALL Gradle caches
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/daemon
          rm -rf .gradle
          rm -rf app/build
          rm -rf app/.gradle
          ./gradlew clean --no-daemon

      - name: COMPREHENSIVE source verification (pre-build)
        run: |
          echo "=== FILE: TtsService.kt (lines 210-230) ==="
          sed -n '210,230p' app/src/main/java/com/epubreader/TtsService.kt
          echo ""
          echo "=== FILE: TtsService.kt (member variables) ==="
          sed -n '70,85p' app/src/main/java/com/epubreader/TtsService.kt
          echo ""
          echo "=== FILE: TtsSettingsActivity.kt (first 30 lines) ==="
          head -30 app/src/main/java/com/epubreader/TtsSettingsActivity.kt
          echo ""
          echo "=== FILE: TtsSettingsActivity.kt (lines 175-195) ==="
          sed -n '175,195p' app/src/main/java/com/epubreader/TtsSettingsActivity.kt

      - name: Verify source RIGHT BEFORE COMPILATION
        run: |
          echo "=== PRE-COMPILATION CHECK ==="
          echo "TtsService.kt line count: $(wc -l < app/src/main/java/com/epubreader/TtsService.kt)"
          echo "TtsService.kt onInit speechRate/pitch lines:"
          grep -n "speechRate\|pitch" app/src/main/java/com/epubreader/TtsService.kt | head -20
          echo ""
          echo "TtsSettingsActivity.kt Voice import:"
          grep -n "Voice" app/src/main/java/com/epubreader/TtsSettingsActivity.kt | head -5
          echo ""
          echo "TtsSettingsActivity.kt ArrayAdapter:"
          grep -n "ArrayAdapter" app/src/main/java/com/epubreader/TtsSettingsActivity.kt

      - name: Build Debug APK (no cache, fresh, rerun tasks)
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=false -Dorg.gradle.configuration-cache=false"
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache \
            --offline=false \
            --rerun-tasks \
            --info

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
