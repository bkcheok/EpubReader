name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r26c
          cmdline-tools-version: latest
          build-tools-version: 34.0.0

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean project (force fresh)
        run: ./gradlew clean

      - name: Full source verification
        run: |
          echo "=== TtsService.kt member variables (lines 65-85) ==="
          sed -n '65,85p' app/src/main/java/com/epubreader/TtsService.kt
          echo ""
          echo "=== TtsService.kt onInit method (lines 230-250) ==="
          sed -n '230,250p' app/src/main/java/com/epubreader/TtsService.kt
          echo ""
          echo "=== TtsService.kt UtteranceProgressListener (lines 155-220) ==="
          sed -n '155,220p' app/src/main/java/com/epubreader/TtsService.kt
          echo ""
          echo "=== TtsSettingsActivity.kt imports ==="
          head -30 app/src/main/java/com/epubreader/TtsSettingsActivity.kt
          echo ""
          echo "=== TtsSettingsActivity.kt spinner adapter ==="
          sed -n '180,195p' app/src/main/java/com/epubreader/TtsSettingsActivity.kt

      - name: Build Debug APK (no cache, no daemon)
        run: ./gradlew assembleDebug --no-daemon --no-build-cache --no-configuration-cache --info

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
