name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository (FRESH)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          cmdline-tools-version: latest
          packages: platform-tools

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: NUCLEAR clean - remove ALL build artifacts
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/daemon
          rm -rf .gradle
          rm -rf app/build
          rm -rf app/.gradle
          rm -rf build
          ./gradlew clean --no-daemon

      - name: PRE-COMPILATION source verification
        run: |
          echo "=== TtsService.kt onInit ==="
          sed -n '210,230p' app/src/main/java/com/epubreader/TtsService.kt
          echo ""
          echo "=== TtsService.kt member variables ==="
          sed -n '70,85p' app/src/main/java/com/epubreader/TtsService.kt
          echo ""
          echo "=== TtsSettingsActivity.kt imports ==="
          head -15 app/src/main/java/com/epubreader/TtsSettingsActivity.kt

      - name: Build Debug APK (no cache, fresh)
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=false -Dorg.gradle.configuration-cache=false"
        run: ./gradlew assembleDebug --no-daemon --no-build-cache --no-configuration-cache --offline=false --rerun-tasks --info

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
